<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Phillies Lineup Tracker</title>
<style>
  :root {
    --red: #E81828;
    --red-dim: #5a0910;
    --red-mid: #9e1019;
    --navy: #002D72;
    --navy-dim: #001540;
    --navy-mid: #00205a;
    --cream: #FFFFFF;
    --cream2: #F0EBE0;
    --bg: #1c1c1e;
    --bg2: #2a2a2e;
    --bg3: #222226;
    --border: #3a3a3e;
    --border2: #444;
    --muted: #999;
    --text: #FFFFFF;
    --text2: #b8b0a0;
    --text3: #888;
    --gold: #C5A028;
    --gold-dim: #3a2d0a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html { background: #1c1c1e; }

  body {
    background: #1c1c1e;
    color: #FFFFFF;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: #E81828;
    background-image:
      repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px);
    border-bottom: 4px solid #002D72;
    padding: 0;
  }
  .header-inner {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 10px; padding: 12px 16px;
    max-width: 900px; margin: 0 auto;
  }
  .header-brand { display: flex; align-items: center; gap: 12px; }
  .header-logo {
    width: 48px; height: 48px; border-radius: 50%;
    background: #002D72; border: 3px solid #FFFFFF;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  .header-title {
    font-family: 'Arial Narrow', 'Helvetica Neue', Arial, sans-serif; font-stretch: condensed; font-weight: 700;
    font-size: 20px; font-weight: 700; letter-spacing: 2px;
    color: #FFFFFF; text-transform: uppercase; line-height: 1.1;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.4);
  }
  .header-sub { font-size: 10px; color: rgba(245,240,232,0.6); letter-spacing: 3px; margin-top: 2px; }

  /* TABS */
  .tabs {
    background: #002D72;
    border-bottom: 2px solid #000;
    padding: 0 16px;
    display: flex; gap: 0; overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    padding: 10px 14px; border: none; border-bottom: 3px solid transparent;
    background: transparent; color: rgba(245,240,232,0.5);
    font-family: 'Arial Narrow', 'Helvetica Neue', Arial, sans-serif;
    font-weight: 600; font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; white-space: nowrap; transition: color 0.15s;
  }
  .tab-btn.active {
    color: #FFFFFF; border-bottom-color: #E81828;
  }

  .content { padding: 16px; max-width: 900px; margin: 0 auto; }

  /* BUTTONS */
  .btn {
    padding: 9px 16px; border-radius: 3px;
    font-family: 'Arial Narrow', 'Helvetica Neue', Arial, sans-serif;
    font-weight: 600; font-size: 12px; letter-spacing: 2px;
    cursor: pointer; border: 2px solid; text-transform: uppercase;
    transition: opacity 0.15s;
  }
  .btn-red    { border-color: #E81828;   background: #5a0910;   color: #E81828; }
  .btn-green  { border-color: #22c55e;   background: #14532d;   color: #22c55e; }
  .btn-navy   { border-color: #002D72;  background: #001540;  color: #6b9fff; }
  .btn-cancel { border-color: #444; background: #222; color: #d0c8b8; }
  .btn-gold   { border-color: #C5A028;  background: #3a2d0a;  color: #C5A028; }
  .btn-cream  { border-color: #F0EBE0; background: #2a2520; color: #FFFFFF; }
  .btn:disabled { opacity: 0.25; cursor: not-allowed; }

  /* SECTION LABEL */
  .label {
    font-family: 'Arial Narrow', 'Helvetica Neue', Arial, sans-serif;
    font-size: 11px; color: #999; letter-spacing: 3px;
    margin-bottom: 10px; text-transform: uppercase;
    border-bottom: 1px solid #3a3a3e; padding-bottom: 6px;
  }

  /* SCOREBOARD BANNER */
  .game-banner {
    background: #002D72;
    background-image: repeating-linear-gradient(
      90deg, transparent, transparent 2px, rgba(255,255,255,0.02) 2px, rgba(255,255,255,0.02) 3px
    );
    border: 1px solid #000; border-radius: 4px;
    padding: 12px 16px; margin-bottom: 16px;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 10px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 2px 8px rgba(0,0,0,0.4);
  }
  .game-num {
    font-family: 'Arial Narrow', 'Helvetica Neue', Arial, sans-serif;
    font-size: 16px; font-weight: 700; color: #FFFFFF; letter-spacing: 3px;
  }
  .game-meta { font-size: 11px; color: #d0c8b8; letter-spacing: 1px; margin-top: 2px; }

  /* INNING HEADER */
  .inning-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 10px; }
  .inning-display {
    background: #222; border: 1px solid #444; border-radius: 4px;
    padding: 8px 16px; display: flex; align-items: baseline; gap: 8px;
  }
  .inning-label { font-size: 10px; color: #999; letter-spacing: 3px; font-family: 'Arial Narrow', 'Helvetica Neue', Arial, sans-serif; }
  .inning-val {
    font-family: 'Arial Narrow', 'Helvetica Neue', Arial, sans-serif;
    font-size: 32px; font-weight: 700; color: #E81828; line-height: 1;
  }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

  /* POSITION ROWS */
  .pos-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 6px; padding: 8px 12px;
    background: #2a2a2e; border-radius: 3px;
    border-left: 3px solid #444; border-top: 1px solid #3a3a3e; border-right: 1px solid #3a3a3e; border-bottom: 1px solid #3a3a3e;
    transition: border-left-color 0.15s;
  }
  .pos-tag {
    width: 36px; text-align: center; font-weight: 700; font-size: 13px;
    color: #F0EBE0; letter-spacing: 1px; flex-shrink: 0;
    font-family: 'Arial Narrow', 'Helvetica Neue', Arial, sans-serif;
  }
  .pos-name { font-size: 10px; color: #888; flex: 1; letter-spacing: 1px; }
  .pos-select {
    background: #222; border: 1px solid #444; color: #d0c8b8;
    border-radius: 3px; padding: 6px 8px;
    font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 13px;
    cursor: pointer; max-width: 150px; width: 100%;
  }

  /* BENCH */
  .bench-item {
    padding: 9px 12px; margin-bottom: 5px; background: #2a2a2e; border-radius: 3px;
    border: 1px solid #3a3a3e; color: #d0c8b8; font-size: 13px; font-weight: 600;
    display: flex; justify-content: space-between; align-items: center;
    border-left: 3px solid #444;
  }

  /* ROSTER */
  .roster-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 7px 10px; margin-bottom: 4px;
    background: #222; border-radius: 3px; font-size: 13px;
    border: 1px solid #3a3a3e;
  }
  .rm-btn { background: none; border: none; color: #999; cursor: pointer; font-size: 18px; line-height: 1; padding: 0 4px; }
  .rm-btn:active { color: #E81828; }

  /* INPUT */
  .input-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .text-input {
    flex: 1; padding: 9px 12px; background: #222;
    border: 1px solid #444; border-radius: 3px;
    color: #FFFFFF; font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 13px;
  }
  .text-input::placeholder { color: #888; }
  .text-input:focus { outline: none; border-color: #E81828; }

  /* TABLE */
  .prefs-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th {
    padding: 8px 6px; color: #999; font-weight: 700; letter-spacing: 2px;
    font-size: 10px; border-bottom: 2px solid #E81828; text-align: center;
    font-family: 'Arial Narrow', 'Helvetica Neue', Arial, sans-serif;
  }
  th.player-col { text-align: left; padding-left: 12px; }
  td { padding: 8px 4px; text-align: center; border-bottom: 1px solid #3a3a3e; }
  td.player-col { padding: 8px 12px; color: #FFFFFF; font-weight: 700; text-align: left; white-space: nowrap; }
  tr:nth-child(even) td { background: #2a2a2e; }
  tr:nth-child(odd) td  { background: #222226; }

  .pref-btn {
    width: 30px; height: 30px; border-radius: 3px; border: 2px solid; cursor: pointer; font-size: 14px;
    display: inline-flex; align-items: center; justify-content: center; margin: auto;
  }
  .stat-badge { display: inline-block; width: 26px; height: 26px; line-height: 26px; border-radius: 2px; font-size: 12px; font-weight: 700; text-align: center; font-family: 'Arial Narrow', 'Helvetica Neue', Arial, sans-serif; }
  .progress-bar { height: 5px; background: #3a3a3e; border-radius: 2px; width: 50px; overflow: hidden; display: inline-block; vertical-align: middle; }
  .progress-fill { height: 100%; background: #E81828; border-radius: 2px; }

  /* INNING CARDS */
  .inning-card {
    margin-bottom: 12px; padding: 12px 14px; background: #2a2a2e; border-radius: 3px;
    border: 1px solid #3a3a3e; border-top: 2px solid #E81828;
  }
  .inning-title {
    color: #FFFFFF; font-weight: 700; font-size: 12px; margin-bottom: 10px;
    letter-spacing: 3px; font-family: 'Arial Narrow', 'Helvetica Neue', Arial, sans-serif;
  }
  .pos-chips { display: flex; flex-wrap: wrap; gap: 5px; }
  .pos-chip {
    padding: 4px 9px; border-radius: 2px; background: #222; font-size: 11px;
    border: 1px solid #3a3a3e;
  }

  /* GAME DIVIDER */
  .game-divider { display: flex; align-items: center; gap: 12px; margin: 20px 0 12px; }
  .game-divider-line { flex: 1; height: 1px; background: #E81828; opacity: 0.3; }
  .game-divider-label {
    font-size: 11px; font-weight: 700; letter-spacing: 3px; color: #E81828;
    white-space: nowrap; font-family: 'Arial Narrow', 'Helvetica Neue', Arial, sans-serif;
  }

  /* BATTING */
  .batting-slot {
    display: flex; align-items: center; gap: 10px; margin-bottom: 6px;
    padding: 9px 12px; background: #2a2a2e; border-radius: 3px;
    border: 1px solid #3a3a3e; border-left: 3px solid #444;
  }
  .batting-num {
    width: 28px; height: 28px; border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 13px; flex-shrink: 0;
    background: #5a0910; color: #E81828; border: 1px solid #9e1019;
    font-family: 'Arial Narrow', 'Helvetica Neue', Arial, sans-serif;
  }
  .batting-name { flex: 1; font-size: 14px; font-weight: 700; color: #FFFFFF; font-family: 'Helvetica Neue', Arial, sans-serif; }
  .batting-arrows { display: flex; flex-direction: column; gap: 2px; }
  .arrow-btn {
    background: #222; border: 1px solid #444; border-radius: 2px;
    color: #888; cursor: pointer; font-size: 10px; padding: 3px 7px; line-height: 1;
  }
  .arrow-btn:active { background: #2a2a2e; color: #FFFFFF; }
  .batting-select {
    flex: 1; background: #222; border: 1px solid #444; color: #d0c8b8;
    border-radius: 3px; padding: 6px 8px;
    font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 13px; cursor: pointer;
  }
  .batting-committed-badge {
    display: inline-block; padding: 3px 10px; border-radius: 2px;
    background: #001540; border: 1px solid #002D72;
    color: #6b9fff; font-size: 10px; font-weight: 700; letter-spacing: 2px;
    font-family: 'Arial Narrow', 'Helvetica Neue', Arial, sans-serif;
  }
  .batting-order-list { max-width: 420px; }

  .edit-modal-box {
    background: #2a2a2e; border: 1px solid #444;
    border-top: 3px solid #E81828;
    border-radius: 4px; padding: 20px; width: 100%; max-width: 420px;
    max-height: 85vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
  }
  .edit-pos-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 6px; padding: 7px 10px;
    background: #1c1c1e; border-radius: 3px; border-left: 3px solid #444;
  }
  .edit-pos-tag {
    width: 32px; text-align: center; font-weight: 700; font-size: 12px;
    color: #F0EBE0; letter-spacing: 1px; flex-shrink: 0;
    font-family: 'Arial Narrow', 'Helvetica Neue', Arial, sans-serif;
  }
  .edit-select {
    flex: 1; background: #111; border: 1px solid #444; color: #d0c8b8;
    border-radius: 3px; padding: 5px 8px;
    font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 13px; cursor: pointer;
  }
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000;
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .modal-box {
    background: #2a2a2e; border: 1px solid #444;
    border-top: 3px solid #E81828;
    border-radius: 4px; padding: 24px; max-width: 340px; width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
  }
  .modal-title {
    font-size: 15px; font-weight: 700; color: #FFFFFF; letter-spacing: 2px;
    margin-bottom: 10px; font-family: 'Arial Narrow', 'Helvetica Neue', Arial, sans-serif;
  }
  .modal-msg { font-size: 13px; color: #d0c8b8; line-height: 1.6; margin-bottom: 20px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #E81828; color: #FFFFFF; padding: 10px 24px;
    border-radius: 3px; font-weight: 700; font-size: 12px; letter-spacing: 2px;
    opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999;
    white-space: nowrap; font-family: 'Arial Narrow', 'Helvetica Neue', Arial, sans-serif;
    box-shadow: 0 4px 20px rgba(232,24,40,0.4);
  }
  .toast.show { opacity: 1; }
  .empty { color: #888; text-align: center; padding: 40px; font-size: 14px; line-height: 1.8; }

  /* STITCHING DIVIDER */
  .stitch {
    border: none; margin: 16px 0;
    border-top: 2px dashed #444; opacity: 0.5;
  }

  /* DIAMOND */
  .diamond-wrap { max-width: 500px; margin: 0 auto; }
  .diamond-controls { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .diamond-select {
    flex: 1; background: #1c1c1e; border: 1px solid #444; color: #F5F0E8;
    border-radius: 3px; padding: 8px 10px;
    font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 13px; cursor: pointer; min-width: 120px;
  }
  .diamond-svg-wrap {
    background: #1a3a1a;
    background-image: radial-gradient(ellipse at center, #1e4a1e 0%, #0f2a0f 100%);
    border-radius: 8px; padding: 16px; margin-bottom: 16px;
    border: 2px solid #2a4a2a; position: relative;
  }
  .batting-side {
    background: #1c1c1e; border: 1px solid #333; border-radius: 6px;
    padding: 12px; margin-top: 12px;
  }
  .batting-row {
    display: flex; align-items: center; gap: 10px;
    padding: 5px 8px; border-radius: 3px; margin-bottom: 3px;
    font-size: 13px;
  }
  .batting-row:nth-child(odd) { background: #222; }
  .bat-num { color: #E81828; font-weight: 700; width: 20px; text-align: right; font-family: 'Arial Narrow','Helvetica Neue',Arial,sans-serif; }
  .bat-name { color: #F5F0E8; flex: 1; }
  .bat-pos { color: #666; font-size: 11px; font-family: 'Arial Narrow','Helvetica Neue',Arial,sans-serif; }

  /* QUICK VIEW */
  .quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .quick-pos-card {
    background: #1c1c1e; border-radius: 4px; padding: 10px 12px;
    border-left: 3px solid #E81828; border-top: 1px solid #2a2a2e;
    border-right: 1px solid #2a2a2e; border-bottom: 1px solid #2a2a2e;
  }
  .quick-pos { font-size: 10px; font-weight: 700; color: #E81828; letter-spacing: 2px; margin-bottom: 2px; font-family: 'Arial Narrow','Helvetica Neue',Arial,sans-serif; }
  .quick-name { font-size: 16px; font-weight: 700; color: #F5F0E8; }
  .quick-bat { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
  .quick-bat-item { display: flex; align-items: center; gap: 6px; padding: 5px 10px; background: #1c1c1e; border-radius: 3px; border: 1px solid #2a2a2e; font-size: 13px; min-width: 140px; }
  .quick-bat-num { color: #E81828; font-weight: 700; width: 18px; font-family: 'Arial Narrow','Helvetica Neue',Arial,sans-serif; }
  .quick-bat-name { color: #F5F0E8; flex: 1; }
  .quick-bat-pos { color: #555; font-size: 11px; }
  .quick-inning-badge { display: inline-flex; align-items: center; gap: 8px; padding: 6px 14px; background: #1c1c1e; border: 1px solid #333; border-radius: 4px; margin-bottom: 14px; }

  /* PITCH COUNT */
  .pitch-player-card {
    background: #1c1c1e; border-radius: 4px; padding: 12px 14px;
    border: 1px solid #2a2a2e; margin-bottom: 8px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .pitch-name { font-size: 14px; font-weight: 700; color: #F5F0E8; flex: 1; min-width: 80px; }
  .pitch-count-display {
    font-size: 28px; font-weight: 900; font-family: 'Arial Narrow','Helvetica Neue',Arial,sans-serif;
    min-width: 48px; text-align: center;
  }
  .pitch-controls { display: flex; gap: 6px; align-items: center; }
  .pitch-btn {
    width: 36px; height: 36px; border-radius: 50%; border: 2px solid;
    font-size: 18px; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; justify-content: center; line-height: 1;
    font-family: 'Arial Narrow','Helvetica Neue',Arial,sans-serif;
  }
  .pitch-btn-minus { border-color: #444; background: #222; color: #888; }
  .pitch-btn-plus  { border-color: #E81828; background: #5a0910; color: #E81828; }
  .pitch-bar-wrap { width: 100%; height: 6px; background: #2a2a2e; border-radius: 3px; margin-top: 6px; overflow: hidden; }
  .pitch-bar { height: 100%; border-radius: 3px; transition: width 0.2s; }
  .pitch-warning { font-size: 10px; font-weight: 700; letter-spacing: 1px; padding: 2px 8px; border-radius: 2px; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media(max-width: 600px) { .two-col { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-inner">
    <div class="header-brand">
      <div class="header-logo">⚾</div>
      <div>
        <div class="header-title">Phillies Lineup Tracker</div>
        <div id="header-sub" class="header-sub">GAME 1 · INNING 1</div>
      </div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('lineup')">⚾ Lineup</button>
    <button class="tab-btn" onclick="showTab('quick')">Inning View</button>
    <button class="tab-btn" onclick="showTab('pitches')">Pitch Count</button>
    <button class="tab-btn" onclick="showTab('batting')">Batting Order</button>
    <button class="tab-btn" onclick="showTab('prefs')">Prefs</button>
    <button class="tab-btn" onclick="showTab('stats')">Position Count</button>
    <button class="tab-btn" onclick="showTab('history')">Lineup History</button>
    <button class="tab-btn" onclick="showTab('diamond')">Lineup Card</button>
  </div>
</div>

<div class="content">
  <div id="tab-lineup"></div>
  <div id="tab-quick" style="display:none"></div>
  <div id="tab-pitches" style="display:none"></div>
  <div id="tab-batting" style="display:none"></div>
  <div id="tab-prefs" style="display:none"></div>
  <div id="tab-stats" style="display:none"></div>
  <div id="tab-history" style="display:none"></div>
  <div id="tab-diamond" style="display:none"></div>
</div>

<!-- MODAL -->
<div id="modal-overlay" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-msg" style="font-size:13px;color:#b8b0a0;line-height:1.6;margin-bottom:20px;max-height:60vh;overflow-y:auto"></div>
    <div class="modal-btns">
      <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn btn-red" id="modal-confirm-btn">Confirm</button>
    </div>
  </div>
</div>

<!-- GAME DETAILS MODAL -->
<div id="game-details-overlay" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div class="modal-title" id="game-details-title" style="margin-bottom:14px"></div>
    <div style="margin-bottom:12px">
      <div style="font-size:10px;color:#999;letter-spacing:2px;margin-bottom:6px;font-family:'Arial Narrow','Helvetica Neue',Arial,sans-serif">DATE</div>
      <input id="game-date-input" type="date" class="text-input" style="width:100%">
    </div>
    <div style="margin-bottom:20px">

<script type="module">

// Show loading overlay
document.getElementById("loading-overlay").style.display = "flex";

const POSITIONS = ["P","C","1B","2B","3B","SS","LF","CF","RF"];
const POS_NAMES = {P:"Pitcher",C:"Catcher","1B":"1st Base","2B":"2nd Base","3B":"3rd Base",SS:"Shortstop",LF:"Left Field",CF:"Center Field",RF:"Right Field"};
const PREF_CYCLE = ["neutral","preferred","avoid"];
const PREF_ICON  = {preferred:"★", avoid:"✗", neutral:"○"};
const PREF_COLOR = {preferred:"#E81828", avoid:"#888", neutral:"#444"};
const PREF_TEXT  = {preferred:"#E81828", avoid:"#888", neutral:"#999"};
const DEFAULT_PLAYERS = ["Luca","Josie","Maeve","Oscar","Jacob","Owen","Leo","Ryder","Wren","Willa","Finn","Indy","Sadie"];

function freshCounts(players) {
  const c = {};
  players.forEach(p => { c[p] = {}; POSITIONS.forEach(pos => { c[p][pos] = 0; }); c[p].bench = 0; });
  return c;
}
function freshPrefs(players) {
  const p = {};
  players.forEach(n => { p[n] = {}; POSITIONS.forEach(pos => { p[n][pos] = "neutral"; }); });
  return p;
}

function defaultState() {
  const players = [...DEFAULT_PLAYERS];
  return { players, prefs: freshPrefs(players), counts: freshCounts(players), history: [], inning: 1, activeInning: 1, lineup: {}, draftLineups: {}, game: 1, games: [], battingOrder: [...players], battingCommitted: false, pendingBatting: [...players], absent: [], gameInfo: {}, pitchCounts: {}, pitchLimit: 50, ageGroup: '7-8', removedPitchers: {} };
}

function ensureFields(s) {
  if (!s.game) s.game = 1;
  if (!s.games) s.games = [];
  if (!s.battingOrder) s.battingOrder = [...s.players];
  if (s.battingCommitted === undefined) s.battingCommitted = false;
  if (!s.pendingBatting) s.pendingBatting = [...s.players];
  if (!s.absent) s.absent = [];
  if (!s.gameInfo) s.gameInfo = {};
  if (!s.pitchCounts) s.pitchCounts = {};
  if (!s.pitchLimit) s.pitchLimit = 50;
  if (!s.ageGroup) s.ageGroup = '7-8';
  if (!s.removedPitchers) s.removedPitchers = {};
  if (!s.activeInning) s.activeInning = s.inning || 1;
  if (!s.draftLineups) s.draftLineups = {};
  return s;
}

async function saveState() {
  try {
    await setDoc(STATE_DOC, state);
  } catch(e) {
    console.error("Save failed:", e);
    showToast("Save failed — check connection", "#c00");
  }
}

let state = defaultState();
let unsubscribe = null;

// Load initial state then subscribe to live updates
async function initApp() {
  try {
    const snap = await getDoc(STATE_DOC);
    if (snap.exists()) {
      state = ensureFields(snap.data());
    } else {
      // First time — write default state
      await setDoc(STATE_DOC, state);
    }
  } catch(e) {
    console.error("Load failed:", e);
  }

  document.getElementById("loading-overlay").style.display = "none";
  render();
  showTab("lineup");

  // Live listener — updates UI when another device saves
  unsubscribe = onSnapshot(STATE_DOC, (snap) => {
    if (snap.exists()) {
      const incoming = ensureFields(snap.data());
      // Only update if different from what we just saved (avoid echo)
      state = incoming;
      render();
    }
  }, (err) => console.error("Listener error:", err));
}

initApp();

// ── MODAL ─────────────────────────────────────────────────────────────────────
function showModal(title, msg, confirmLabel, onConfirm, confirmClass) {

}
function closeModal() { document.getElementById("modal-overlay").style.display = "none"; }

// ── TOAST ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, color) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.style.background = color || "#E81828";
  t.classList.add("show"); clearTimeout(toastTimer);

}

// ── TABS ──────────────────────────────────────────────────────────────────────
const TAB_NAMES = ["lineup","quick","pitches","batting","prefs","stats","history","diamond"];
let activeTab = "lineup";
function showTab(tab) {
  activeTab = tab;
  TAB_NAMES.forEach((t, i) => {
    document.getElementById("tab-"+t).style.display = t === tab ? "" : "none";
    document.querySelectorAll(".tab-btn")[i].classList.toggle("active", t === tab);
  });

// ── HELPERS ───────────────────────────────────────────────────────────────────
function totalInnings(p) { return POSITIONS.reduce((s,pos) => s+(state.counts[p]?.[pos]||0),0); }
function ensurePlayer(p) {
  if (!state.prefs[p]) { state.prefs[p]={}; POSITIONS.forEach(pos=>state.prefs[p][pos]="neutral"); }
  if (!state.counts[p]) { state.counts[p]={}; POSITIONS.forEach(pos=>state.counts[p][pos]=0); state.counts[p].bench=0; }
}
function updateHeaderSub() {
  document.getElementById("header-sub").textContent = `GAME ${state.game}  ·  INNING ${state.inning}`;
}

// ── BATTING ───────────────────────────────────────────────────────────────────
function moveBatter(idx, dir) {
  const order = [...state.pendingBatting];
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= order.length) return;
  [order[idx], order[newIdx]] = [order[newIdx], order[idx]];
  state.pendingBatting = order; saveState(); renderBattingTab();
}
function setBatterAtSlot(idx, player) {
  const order = [...state.pendingBatting];
  const from = order.indexOf(player);
  if (from === -1) return;
  [order[idx], order[from]] = [order[from], order[idx]];
  state.pendingBatting = order; saveState(); renderBattingTab();
}
function commitBattingOrder() {
  state.battingOrder = [...state.pendingBatting];
  state.battingCommitted = true;
  saveState(); showToast("Batting order locked", "#002D72"); renderBattingTab();
}
function editBattingOrder() {
  state.battingCommitted = false;
  state.pendingBatting = [...state.battingOrder];
  saveState(); renderBattingTab();
}
function rotateBattingOrder() {
  if (!state.battingOrder.length) return;
  const last = state.battingOrder[state.battingOrder.length-1];
  state.battingOrder = [last, ...state.battingOrder.slice(0,-1)];
  state.pendingBatting = [...state.battingOrder];
  state.battingCommitted = false;
}

function toggleAbsent(p) {
  if (state.absent.includes(p)) {
    state.absent = state.absent.filter(x => x !== p);
  } else {
    state.absent.push(p);
    // remove from lineup if currently assigned
    Object.keys(state.lineup).forEach(pos => { if (state.lineup[pos] === p) delete state.lineup[pos]; });
  }
  saveState(); renderLineupTab();
}

// ── AUTO ASSIGN ───────────────────────────────────────────────────────────────
function autoAssign() {
  const available = state.players.filter(p => !state.absent.includes(p));

  const INFIELD  = ["P","C","1B","2B","3B","SS"];
  const OUTFIELD = ["LF","CF","RF"];

  // ── ALL-TIME COUNTS (archived + current game) ─────────────────────────────
  const allCounts  = {}; // pos counts
  const benchTotal = {}; // bench innings
  available.forEach(p => {
    allCounts[p]  = {}; POSITIONS.forEach(pos => { allCounts[p][pos] = 0; });
    benchTotal[p] = 0;
    state.games.forEach(g => {
      if (!g.counts?.[p]) return;
      POSITIONS.forEach(pos => { allCounts[p][pos] += g.counts[p][pos] || 0; });
      benchTotal[p] += g.counts[p].bench || 0;
    });
    POSITIONS.forEach(pos => { allCounts[p][pos] += state.counts[p]?.[pos] || 0; });
    benchTotal[p] += state.counts[p]?.bench || 0;
    // Absent from a game = 1 bench credit per game missed
    const absentGames = new Set();
    state.history.forEach(h => { if ((h.absent||[]).includes(p)) absentGames.add(h.game); });
    benchTotal[p] += absentGames.size;
  });

  // ── POSITIONS PLAYED THIS GAME ────────────────────────────────────────────
  const playedThisGame = {}; // player -> Set of positions already played this game
  available.forEach(p => { playedThisGame[p] = new Set(); });
  state.history.filter(h => h.game === state.game).forEach(h => {
    Object.entries(h.lineup||{}).forEach(([pos, player]) => {
      if (playedThisGame[player]) playedThisGame[player].add(pos);
    });
  });

  // ── INFIELD / OUTFIELD BALANCE THIS GAME ─────────────────────────────────
  const infieldCount  = {}; // innings in infield this game
  const outfieldCount = {}; // innings in outfield this game
  available.forEach(p => { infieldCount[p] = 0; outfieldCount[p] = 0; });
  state.history.filter(h => h.game === state.game).forEach(h => {
    Object.entries(h.lineup||{}).forEach(([pos, player]) => {
      if (!available.includes(player)) return;
      if (INFIELD.includes(pos))  infieldCount[player]++;
      if (OUTFIELD.includes(pos)) outfieldCount[player]++;
    });
  });

  // ── PITCHED LAST GAME ─────────────────────────────────────────────────────
  const lastGameNum = state.game - 1;
  const lastGameHistory = state.history.filter(h => h.game === lastGameNum);
  const pitchedLastGame = new Set(
    lastGameHistory.map(h => h.lineup?.['P']).filter(Boolean)
  );

  // ── BENCH INNINGS LAST 2 GAMES ────────────────────────────────────────────
  const recentBench = {};
  available.forEach(p => { recentBench[p] = 0; });
  state.history.filter(h => h.game >= state.game - 1).forEach(h => {
    (h.bench||[]).forEach(p => { if (recentBench[p] !== undefined) recentBench[p]++; });
  });
  // Absent from a game = 1 bench credit per game (not per inning)
  const recentAbsentGames = {};
  available.forEach(p => { recentAbsentGames[p] = new Set(); });
  state.history.filter(h => h.game >= state.game - 1).forEach(h => {
    (h.absent||[]).forEach(p => { if (recentAbsentGames[p]) recentAbsentGames[p].add(h.game); });
  });
  available.forEach(p => { recentBench[p] += recentAbsentGames[p].size; });

  // ── TOTAL INNINGS PLAYED THIS GAME ───────────────────────────────────────
  const thisGameInnings = {};
  available.forEach(p => { thisGameInnings[p] = 0; });
  state.history.filter(h => h.game === state.game).forEach(h => {
    Object.values(h.lineup||{}).forEach(player => {
      if (thisGameInnings[player] !== undefined) thisGameInnings[player]++;
    });
  });

  // ── WHO SAT LAST INNING ───────────────────────────────────────────────────
  const lastInningNum = state.inning - 1;
  const lastInningEntry = state.history.find(h => h.game === state.game && h.inning === lastInningNum);
  const satLastInning = new Set(lastInningEntry?.bench || []);

  // ── SCORE FUNCTION ────────────────────────────────────────────────────────
  function isEligible(player, pos) {
    const pref = state.prefs[player]?.[pos] || "neutral";
    if (pref === "avoid") return false;
    if (pos === 'P' && pitchedLastGame.has(player)) return false;
    if (pos === 'P' && isRemovedPitcher(player)) return false;
    if (pos === 'P' && getCatcherInnings(player) >= 4) return false;
    if (pos === 'C' && !catcherEligibility(player).eligible) return false;
    return true;
  }

  function score(player, pos) {
    let s = 0;

    // Preferred = strong priority bonus
    const pref = state.prefs[player]?.[pos] || "neutral";
    if (pref === "preferred") s += 60;

    // Already played this position this game — heavy penalty
    if (playedThisGame[player].has(pos)) s -= 40;

    // All-time position count — less played = higher priority
    s -= (allCounts[player][pos] || 0) * 3;

    // Bench equity — more bench time = higher priority for field
    s += (benchTotal[player] || 0) * 2;
    s += (recentBench[player] || 0) * 4;

    // Don't let players who played a lot this game hog spots
    s -= (thisGameInnings[player] || 0) * 2;

    // Sat last inning — strong infield priority, heavy outfield penalty
    if (satLastInning.has(player)) {
      if (INFIELD.includes(pos))  s += 50;
      if (OUTFIELD.includes(pos)) s -= 50;
    }

    // Infield / outfield balance
    if (INFIELD.includes(pos)) {
      const imbalance = infieldCount[player] - outfieldCount[player];
      s -= imbalance * 3;
    }
    if (OUTFIELD.includes(pos)) {
      const imbalance = outfieldCount[player] - infieldCount[player];
      s -= imbalance * 3;
    }

    // No pitcher from last game
    if (pos === 'P' && pitchedLastGame.has(player)) s -= 60;

    return s;
  }

  // ── GREEDY ASSIGNMENT ─────────────────────────────────────────────────────
  // Filter candidates to eligible only — avoid is a hard elimination
  // Fill positions with fewest eligible players first (hardest to fill goes first)
  const lineup  = {};
  const assigned = new Set();

  const posOrder = [...POSITIONS].sort((a, b) => {
    const aOpts = available.filter(p => isEligible(p, a)).length;
    const bOpts = available.filter(p => isEligible(p, b)).length;
    return aOpts - bOpts;
  });

  posOrder.forEach(pos => {
    // Only consider eligible (non-avoid) players
    let candidates = available.filter(p => !assigned.has(p) && isEligible(p, pos));
    // Fallback: if no eligible player, allow any unassigned (avoids breaking the lineup)
    if (candidates.length === 0) candidates = available.filter(p => !assigned.has(p));
    const best = candidates.sort((a, b) => score(b, pos) - score(a, pos))[0];
    if (best) { lineup[pos] = best; assigned.add(best); }
  });

  state.lineup = lineup;
  state.draftLineups[state.activeInning] = {...lineup};
  saveState();
  render();
}

function recommitInning() {
  if (Object.keys(state.lineup).length < 9) return;
  commitInning();
}

// ── VALIDATE FULL GAME ────────────────────────────────────────────────────────
function setGameLineup() {
  const errors = [];
  const warnings = [];

  const committedInnings = state.history.filter(h => h.game === state.game).sort((a,b) => a.inning - b.inning);

  if (committedInnings.length === 0) {
    showModal("LINEUP CHECK", "No innings committed yet for this game.", "OK", closeModal, "btn-cancel");
    document.getElementById("modal-confirm-btn").onclick = closeModal;
    return;
  }

  const INFIELD  = ["P","C","1B","2B","3B","SS"];
  const OUTFIELD = ["LF","CF","RF"];

  // Build per-player tracking across the game
  const positionCounts   = {}; // how many times each player played each pos
  const infieldCount     = {};
  const outfieldCount    = {};
  const benchCount       = {};
  const pitchedInnings   = {}; // innings where player pitched
  const catcherInnings   = {}; // innings where player caught
  const removedPitchers  = new Set(
    Object.keys(state.removedPitchers)
      .filter(k => k.startsWith(state.game + '_'))
      .map(k => k.replace(state.game + '_', ''))
  );

  state.players.forEach(p => {
    positionCounts[p] = {}; infieldCount[p] = 0; outfieldCount[p] = 0;
    benchCount[p] = 0; pitchedInnings[p] = []; catcherInnings[p] = [];
  });

  committedInnings.forEach(h => {
    Object.entries(h.lineup || {}).forEach(([pos, player]) => {
      if (!positionCounts[player]) return;
      positionCounts[player][pos] = (positionCounts[player][pos] || 0) + 1;
      if (INFIELD.includes(pos))  infieldCount[player]++;
      if (OUTFIELD.includes(pos)) outfieldCount[player]++;
      if (pos === 'P') pitchedInnings[player].push(h.inning);
      if (pos === 'C') catcherInnings[player].push(h.inning);
    });
    (h.bench || []).forEach(p => { if (benchCount[p] !== undefined) benchCount[p]++; });
  });

  const numInnings = committedInnings.length;

  // Last game pitchers
  const lastGameNum = state.game - 1;
  const pitchedLastGame = new Set(
    state.history.filter(h => h.game === lastGameNum).map(h => h.lineup?.['P']).filter(Boolean)
  );

  // ── RULE CHECKS ──────────────────────────────────────────────────────────

  state.players.forEach(player => {
    // Pitched more than once this game
    if (pitchedInnings[player].length > 1) {
      warnings.push(player+' pitched '+pitchedInnings[player].length+' innings (innings '+pitchedInnings[player].join(', ')+')');
    }

    // Pitched last game
    if (pitchedLastGame.has(player) && pitchedInnings[player].length > 0) {
      warnings.push(player+' pitched last game and is pitching again this game');
    }

    // Removed pitcher re-assigned
    if (removedPitchers.has(player) && pitchedInnings[player].length > 0) {
      errors.push(player+' was removed from the mound but pitched again (innings '+pitchedInnings[player].join(', ')+')');
    }

    // Caught 4+ innings then pitched
    if (catcherInnings[player].length >= 4 && pitchedInnings[player].length > 0) {
      const caughtBefore = catcherInnings[player].filter(i => Math.min(...pitchedInnings[player]) > i);
      if (caughtBefore.length >= 4) {
        errors.push(player+' caught 4+ innings then pitched — ineligible');
      }
    }

    // Pitched 41+ then caught
    const pitches = getPitches(player);
    if (pitches >= 41 && catcherInnings[player].length > 0) {
      errors.push(player+' threw '+pitches+' pitches and played catcher — ineligible after 41+ pitches');
    }

    // Pitch limit
    const limit = getPitchLimit();
    if (pitches > limit) {
      errors.push(player+' exceeded pitch limit ('+pitches+'/'+limit+')');
    } else if (pitches >= limit * 0.8) {
      warnings.push(player+' is near the pitch limit ('+pitches+'/'+limit+')');
    }

    // Avoid preference violated
    Object.entries(positionCounts[player]).forEach(([pos, count]) => {
      const pref = state.prefs[player]?.[pos] || "neutral";
      if (pref === "avoid" && count > 0) {
        errors.push(player+' has ✗ Avoid for '+pos+' but played it '+count+' time'+(count>1?'s':''));
      }
    });

    // Same position played more than twice
    Object.entries(positionCounts[player]).forEach(([pos, count]) => {
      if (count >= 3) {
        warnings.push(player+' played '+pos+' '+count+' times this game');
      }
    });

    // Same position two innings in a row
    for (let i = 0; i < committedInnings.length - 1; i++) {
      const posA = Object.entries(committedInnings[i].lineup||{}).find(([,p])=>p===player)?.[0];
      const posB = Object.entries(committedInnings[i+1].lineup||{}).find(([,p])=>p===player)?.[0];
      if (posA && posB && posA === posB) {
        warnings.push(player+' played '+posA+' two innings in a row (innings '+committedInnings[i].inning+' & '+committedInnings[i+1].inning+')');
      }
    }

    // Infield or outfield two innings in a row
    for (let i = 0; i < committedInnings.length - 1; i++) {
      const posA = Object.entries(committedInnings[i].lineup||{}).find(([,p])=>p===player)?.[0];
      const posB = Object.entries(committedInnings[i+1].lineup||{}).find(([,p])=>p===player)?.[0];
      if (posA && posB) {
        const bothInfield  = INFIELD.includes(posA)  && INFIELD.includes(posB);
        const bothOutfield = OUTFIELD.includes(posA) && OUTFIELD.includes(posB);
        if (bothInfield)  warnings.push(player+' played infield two innings in a row (innings '+committedInnings[i].inning+' & '+committedInnings[i+1].inning+')');
        if (bothOutfield) warnings.push(player+' played outfield two innings in a row (innings '+committedInnings[i].inning+' & '+committedInnings[i+1].inning+')');
      }
    }

    // Heavy outfield load (all outfield, no infield)
    if (numInnings >= 3 && infieldCount[player] === 0 && outfieldCount[player] >= 2) {
      warnings.push(player+' has only played outfield this game ('+outfieldCount[player]+' innings)');
    }

    // Excessive bench time
    if (benchCount[player] >= 3) {
      warnings.push(player+' has sat on the bench '+benchCount[player]+' innings');
    }
  });

  // Any position unfilled in any inning
  committedInnings.forEach(h => {
    const unfilled = POSITIONS.filter(pos => !h.lineup?.[pos]);
    if (unfilled.length > 0) {
      errors.push('Inning '+h.inning+' is missing: '+unfilled.join(', '));
    }
  });

  // Show results
  if (errors.length === 0 && warnings.length === 0) {
    document.getElementById("modal-title").textContent = "LINEUP CHECK";
    document.getElementById("modal-msg").innerHTML = '<div style="text-align:center;padding:16px"><div style="font-size:32px;margin-bottom:8px">✓</div><div style="color:#22c55e;font-size:14px;font-weight:700;letter-spacing:1px">All '+numInnings+' innings look good!</div><div style="color:#666;font-size:12px;margin-top:6px">No rule violations found.</div></div>';
    const btn = document.getElementById("modal-confirm-btn");
    btn.textContent = "OK"; btn.className = "btn btn-green"; btn.onclick = closeModal;
    document.getElementById("modal-overlay").style.display = "flex";
    return;
  }

  showValidationModal(errors, warnings);
}

function showValidationModal(errors, warnings) {
  let body = '';
  if (errors.length) {
    body += '<div style="margin-bottom:12px">'
      +'<div style="font-size:10px;color:#E81828;letter-spacing:2px;font-weight:700;margin-bottom:8px">ERRORS — Must fix before setting</div>';
    errors.forEach(e => {
      body += '<div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;padding:8px 10px;background:#2a0a0a;border:1px solid #5a0910;border-radius:3px">'

        +'<span style="color:#F5F0E8;font-size:13px">'+e+'</span></div>';
    });
    body += '</div>';
  }
  if (warnings.length) {
    body += '<div style="margin-bottom:12px">'
      +'<div style="font-size:10px;color:#f59e0b;letter-spacing:2px;font-weight:700;margin-bottom:8px">WARNINGS — Can still set lineup</div>';
    warnings.forEach(w => {

        +'<span style="color:#f59e0b;font-size:14px;flex-shrink:0">⚠</span>'
        +'<span style="color:#F5F0E8;font-size:13px">'+w+'</span></div>';
    });
    body += '</div>';
  }

  document.getElementById("modal-title").textContent = "LINEUP CHECK";
  document.getElementById("modal-msg").innerHTML = body;
  const btn = document.getElementById("modal-confirm-btn");
  btn.textContent = "OK";
  btn.className = "btn btn-cancel";
  btn.onclick = closeModal;
  document.getElementById("modal-overlay").style.display = "flex";
}

// ── COMMIT INNING ─────────────────────────────────────────────────────────────
function commitInning() {
  if(Object.keys(state.lineup).length<9) return;
  const assigned=Object.values(state.lineup);
  const bench=state.players.filter(p=>!assigned.includes(p) && !state.absent.includes(p));
  const absent=[...state.absent];
  const committingInning = state.activeInning;

  // Check if re-committing an existing inning
  const existingIdx = state.history.findIndex(h => h.game === state.game && h.inning === committingInning);
  if (existingIdx >= 0) {
    state.history[existingIdx] = {game:state.game,inning:committingInning,lineup:{...state.lineup},bench:[...bench],absent:[...absent]};
    recalcStatsFromHistory();
  } else {
    Object.entries(state.lineup).forEach(([pos,p])=>{
      if(!state.counts[p]) state.counts[p]={};
      state.counts[p][pos]=(state.counts[p][pos]||0)+1;
    });
    bench.forEach(p=>{
      if(!state.counts[p]) state.counts[p]={};
      state.counts[p].bench=(state.counts[p].bench||0)+1;
    });
    state.history.push({game:state.game,inning:committingInning,lineup:{...state.lineup},bench:[...bench],absent:[...absent]});
    // Advance the inning pointer if we committed the next sequential inning
    if (committingInning >= state.inning) {
      state.inning = committingInning + 1;
    }
  }

  // Clear draft for this inning, stay on it so dropdowns remain visible
  delete state.draftLineups[committingInning];
  // Keep lineup populated from what was just committed so UI stays intact
  // activeInning stays on the inning we just committed

  saveState(); showToast("Inning "+committingInning+" committed ✓"); render();
}

function setActiveInning(n) {
  state.activeInning = n;
  // Load draft if exists, otherwise load committed history, otherwise blank
  if (state.draftLineups[n] && Object.keys(state.draftLineups[n]).length > 0) {
    state.lineup = {...state.draftLineups[n]};
  } else {
    const entry = state.history.find(h => h.game === state.game && h.inning === n);
    if (entry) {
      state.lineup = {...entry.lineup};
      state.draftLineups[n] = {...entry.lineup};
    } else {
      state.lineup = {};
    }
  }
  saveState(); render();
}

let pendingNewGame = false;

function newGame() {
  pendingNewGame = true;
  document.getElementById("game-details-title").textContent = `START GAME ${state.game + 1}`;
  // Pre-fill today's date
  const today = new Date().toISOString().split('T')[0];

}

function editGameInfo() {
  pendingNewGame = false;
  document.getElementById("game-details-title").textContent = `GAME ${state.game} DETAILS`;
  const info = state.gameInfo[state.game] || {};
  document.getElementById("game-date-input").value = info.date || "";
  document.getElementById("game-opponent-input").value = info.opponent || "";

}

function closeGameDetailsModal() {
  pendingNewGame = false;
  document.getElementById("game-details-overlay").style.display = "none";
}

function confirmGameDetails() {
  const date = document.getElementById("game-date-input").value;
  const opponent = document.getElementById("game-opponent-input").value.trim();
  const isNewGame = pendingNewGame; // capture before closeGameDetailsModal resets it
  closeGameDetailsModal();

  if (isNewGame) {
    state.games.push({game:state.game, innings:state.inning-1, counts:JSON.parse(JSON.stringify(state.counts))});
    state.game++; state.inning=1; state.activeInning=1; state.lineup={}; state.draftLineups={};
    state.counts=freshCounts(state.players);
    rotateBattingOrder();
    state.gameInfo[state.game] = { date, opponent };    saveState(); showToast(`Game ${state.game} — Play ball! ⚾`, "#002D72"); render();
  } else {
    state.gameInfo[state.game] = { date, opponent };
    saveState(); showToast("Game details saved ✓"); render();
  }
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function setPos(pos,player) {
  // Always edit the draft for the active inning
  if (!state.draftLineups[state.activeInning]) state.draftLineups[state.activeInning] = {};
  const draft = state.draftLineups[state.activeInning];
  // Remove player from other positions in this draft
  Object.keys(draft).forEach(p=>{ if(draft[p]===player) delete draft[p]; });
  if(player) draft[pos]=player; else delete draft[pos];
  // Keep state.lineup in sync with the active inning's draft
  state.lineup = {...draft};
  saveState(); renderLineupTab();
}
function cyclePref(player,pos) {
  const cur=state.prefs[player]?.[pos]||"neutral";
  state.prefs[player][pos]=PREF_CYCLE[(PREF_CYCLE.indexOf(cur)+1)%3];
  saveState(); renderPrefsTab();
}
function addPlayer() {
  const name=document.getElementById("new-player-input").value.trim();
  if(!name||state.players.includes(name)) return;
  state.players.push(name); ensurePlayer(name);
  if(!state.battingOrder.includes(name)) state.battingOrder.push(name);
  if(!state.pendingBatting.includes(name)) state.pendingBatting.push(name);
  document.getElementById("new-player-input").value="";
  saveState(); render();
}
function removePlayer(p) {
  showModal("Remove Player",`Remove ${p} from the roster?`,"Remove",()=>{
    state.players=state.players.filter(x=>x!==p);
    state.battingOrder=state.battingOrder.filter(x=>x!==p);
    state.pendingBatting=state.pendingBatting.filter(x=>x!==p);
    delete state.prefs[p]; delete state.counts[p];
    Object.keys(state.lineup).forEach(pos=>{if(state.lineup[pos]===p)delete state.lineup[pos];});
    saveState(); render();
  },"btn-red");
}
function resetAll() {
  showModal("Reset All Stats","Reset all stats, history, and games? Roster, preferences, and batting order are kept.","Reset",()=>{
    state.counts=freshCounts(state.players);
    state.history=[]; state.games=[]; state.inning=1; state.game=1; state.lineup={};
    saveState(); showToast("Stats reset"); render();
  },"btn-red");
}

// ── RENDER STATS ──────────────────────────────────────────────────────────────
function allGamesCounts() {
  const merged={};
  state.players.forEach(p=>{
    merged[p]={bench:0};
    POSITIONS.forEach(pos=>{merged[p][pos]=0;});
    state.games.forEach(g=>{
      if(!g.counts?.[p]) return;
      POSITIONS.forEach(pos=>{merged[p][pos]+=g.counts[p][pos]||0;});
      merged[p].bench+=g.counts[p].bench||0;
    });
    POSITIONS.forEach(pos=>{merged[p][pos]+=state.counts[p]?.[pos]||0;});
    merged[p].bench+=state.counts[p]?.bench||0;
    // Count each game where player was absent as just 1 bench inning total
    const absentGames = new Set();
    state.history.forEach(h=>{
      if((h.absent||[]).includes(p)) absentGames.add(h.game);
    });
    merged[p].bench += absentGames.size;
  });
  return merged;
}

let statsSelectedGame = 'all';

function getGameCounts(gameNum) {
  // Returns counts for a specific game only
  const merged = {};
  state.players.forEach(p => {
    merged[p] = { bench: 0 };
    POSITIONS.forEach(pos => { merged[p][pos] = 0; });
    if (gameNum === state.game) {
      POSITIONS.forEach(pos => { merged[p][pos] += state.counts[p]?.[pos] || 0; });
      merged[p].bench += state.counts[p]?.bench || 0;
    } else {
      const g = state.games.find(g => g.game === gameNum);
      if (g?.counts?.[p]) {
        POSITIONS.forEach(pos => { merged[p][pos] += g.counts[p][pos] || 0; });
        merged[p].bench += g.counts[p].bench || 0;
      }
    }
    // Absent counts as 1 bench per game missed
    const absentThisGame = state.history.some(h => h.game === gameNum && (h.absent||[]).includes(p));
    if (absentThisGame) merged[p].bench += 1;
  });
  return merged;
}

  statsSelectedGame = val === 'all' ? 'all' : parseInt(val);

    html+='<tr><td class="player-col">'+player+'</td>';
    POSITIONS.forEach(pos=>{
      const count=counts[player]?.[pos]||0;
      const pref=state.prefs[player]?.[pos]||"neutral";
      if(!count){ html+='<td><span style="color:#444">—</span></td>'; return; }
      const bg=pref==="preferred"?"#5a0910":pref==="avoid"?"#222":"#001540";
      const c=pref==="preferred"?"#E81828":pref==="avoid"?"#999":"#6b9fff";
      html+='<td><span class="stat-badge" style="background:'+bg+';color:'+c+'">'+count+'</span></td>';
    });
    const pct=Math.round((total/maxInn)*100);
    html+='<td style="text-align:center"><span style="color:#888;font-size:12px">'+(counts[player]?.bench||0)+'</span></td>'
      +'<td style="text-align:center"><div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>'
      +'<span style="color:#E81828;font-weight:700;margin-left:6px">'+total+'</span></td></tr>';
  });
  html+='</tbody></table></div>';
  document.getElementById("tab-stats").innerHTML=html;
}

// ── RECALCULATE STATS FROM HISTORY ───────────────────────────────────────────
function recalcStatsFromHistory() {
  // Reset current game counts
  state.counts = freshCounts(state.players);

  // Reset all archived game counts
  state.games.forEach(g => { g.counts = freshCounts(state.players); });

  // Replay entire history
  state.history.forEach(entry => {
    const { game, lineup, bench } = entry;
    const isCurrentGame = game === state.game;
    const target = isCurrentGame ? state.counts : state.games.find(g => g.game === game)?.counts;
    if (!target) return;

    Object.entries(lineup).forEach(([pos, player]) => {
      if (!target[player]) { target[player] = {}; POSITIONS.forEach(p => target[player][p] = 0); target[player].bench = 0; }
      target[player][pos] = (target[player][pos] || 0) + 1;
    });
    (bench || []).forEach(player => {
      if (!target[player]) { target[player] = {}; POSITIONS.forEach(p => target[player][p] = 0); target[player].bench = 0; }
      target[player].bench = (target[player].bench || 0) + 1;
    });
  });
}

function closeEditModal() {
  document.getElementById("edit-modal-overlay").style.display = "none";
  editingInningIdx = null;
}

function saveEditedInning() {
  if (editingInningIdx === null) return;
  const entry = state.history[editingInningIdx];

  // Build new lineup from position selects
  const newLineup = {};
  POSITIONS.forEach(pos => {
    const val = document.getElementById('edit-pos-'+pos)?.value;
    if (val) newLineup[pos] = val;
  });

  // Build absent from checkboxes
  const newAbsent = state.players.filter(p => document.getElementById('edit-absent-'+p)?.checked);

  // Bench = players not assigned to a position and not absent
  const assigned = Object.values(newLineup);
  const newBench = state.players.filter(p => !assigned.includes(p) && !newAbsent.includes(p));

  state.history[editingInningIdx] = { ...entry, lineup: newLineup, bench: newBench, absent: newAbsent };

  recalcStatsFromHistory();
  saveState();
  closeEditModal();
  showToast("Inning updated ✓");
  render();
}

// ── RENDER HISTORY ────────────────────────────────────────────────────────────
function deleteInning(historyIdx) {
  const entry = state.history[historyIdx];
  showModal(
    'DELETE INNING',
    'Delete Game '+entry.game+' — Inning '+entry.inning+'? Stats will be recalculated.',
    'Delete',
    () => {
      state.history.splice(historyIdx, 1);
      // If we deleted an inning from the current game, update the inning pointer
      const currentGameInnings = state.history.filter(h => h.game === state.game).map(h => h.inning);
      const maxInning = currentGameInnings.length ? Math.max(...currentGameInnings) : 0;
      if (state.inning > maxInning + 1) state.inning = maxInning + 1;
      if (state.activeInning > state.inning) state.activeInning = state.inning;
      recalcStatsFromHistory();
      saveState();
      showToast('Inning deleted');
      render();
    },
    'btn-red'
  );
}

// ── DIAMOND SVG ───────────────────────────────────────────────────────────────
function buildDiamondSVG(lineup, width) {
  const w = width || 320, h = w * 0.92;
  const cx = w / 2;
  // Base positions in SVG coords (scaled to w)
  const scale = w / 320;
  const positions = {
    P:  { x: cx,           y: h * 0.58 },
    C:  { x: cx,           y: h * 0.92 },
    "1B": { x: cx + 95*scale, y: h * 0.55 },
    "2B": { x: cx + 48*scale, y: h * 0.28 },
    "3B": { x: cx - 95*scale, y: h * 0.55 },
    SS:  { x: cx - 48*scale, y: h * 0.28 },
    LF:  { x: cx - 100*scale, y: h * 0.13 },
    CF:  { x: cx,           y: h * 0.07 },
    RF:  { x: cx + 100*scale, y: h * 0.13 },
  };

  // Diamond base coords
  const home = { x: cx, y: h * 0.85 };
  const first = { x: cx + 85*scale, y: h * 0.62 };
  const second = { x: cx, y: h * 0.38 };
  const third = { x: cx - 85*scale, y: h * 0.62 };

  function nameLabel(pos, player) {
    const p = positions[pos];
    if (!p) return '';
    const hasPlayer = player && player.length > 0;
    const boxW = 70*scale, boxH = 30*scale, r = 4;
    const bx = p.x - boxW/2, by = p.y - boxH/2;
    const bgColor = hasPlayer ? '#E81828' : '#333';
    const textColor = '#fff';
    const fontSize = Math.max(9, 11*scale);
    const posSize = Math.max(7, 8*scale);
    return `
      <rect x="${bx}" y="${by}" width="${boxW}" height="${boxH}" rx="${r}" fill="${bgColor}" opacity="${hasPlayer?1:0.4}"/>
      <text x="${p.x}" y="${p.y - boxH/2 + boxH*0.38}" text-anchor="middle" fill="${textColor}" font-size="${posSize}" font-family="Arial Narrow, Arial" font-weight="700" opacity="0.8">${pos}</text>
      <text x="${p.x}" y="${p.y - boxH/2 + boxH*0.75}" text-anchor="middle" fill="${textColor}" font-size="${fontSize}" font-family="Helvetica Neue, Arial" font-weight="600">${hasPlayer ? player : '—'}</text>
    `;
  }

  return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" width="100%">
    <!-- Outfield arc -->
    <path d="M ${cx - 125*scale} ${h*0.45} Q ${cx} ${h*-0.05} ${cx + 125*scale} ${h*0.45}" fill="none" stroke="#2d5a2d" stroke-width="${2*scale}"/>
    <!-- Grass infield -->
    <polygon points="${home.x},${home.y} ${first.x},${first.y} ${second.x},${second.y} ${third.x},${third.y}" fill="#1e4a1e" stroke="#2d5a2d" stroke-width="${1.5*scale}"/>
    <!-- Basepaths -->
    <line x1="${home.x}" y1="${home.y}" x2="${first.x}" y2="${first.y}" stroke="#8B7355" stroke-width="${2*scale}"/>
    <line x1="${first.x}" y1="${first.y}" x2="${second.x}" y2="${second.y}" stroke="#8B7355" stroke-width="${2*scale}"/>
    <line x1="${second.x}" y1="${second.y}" x2="${third.x}" y2="${third.y}" stroke="#8B7355" stroke-width="${2*scale}"/>
    <line x1="${third.x}" y1="${third.y}" x2="${home.x}" y2="${home.y}" stroke="#8B7355" stroke-width="${2*scale}"/>
    <!-- Bases -->
    <rect x="${first.x-8*scale}" y="${first.y-8*scale}" width="${16*scale}" height="${16*scale}" fill="white" rx="2"/>
    <rect x="${second.x-8*scale}" y="${second.y-8*scale}" width="${16*scale}" height="${16*scale}" fill="white" rx="2"/>
    <rect x="${third.x-8*scale}" y="${third.y-8*scale}" width="${16*scale}" height="${16*scale}" fill="white" rx="2"/>
    <!-- Home plate -->
    <polygon points="${home.x},${home.y+10*scale} ${home.x-8*scale},${home.y+4*scale} ${home.x-8*scale},${home.y-6*scale} ${home.x+8*scale},${home.y-6*scale} ${home.x+8*scale},${home.y+4*scale}" fill="white"/>
    <!-- Pitcher mound -->
    <circle cx="${positions.P.x}" cy="${positions.P.y}" r="${8*scale}" fill="#8B7355" opacity="0.6"/>
    <!-- Player labels -->
    ${Object.keys(positions).map(pos => nameLabel(pos, lineup[pos])).join('')}
  </svg>`;
}

// ── PDF EXPORT ────────────────────────────────────────────────────────────────
async function exportGamePDF(gameNum) {
  showToast("Generating PDF...", "#002D72");

  // Load jsPDF from CDN
  if (!window.jspdf) {
    await new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
      s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'pt', format: 'letter' });

  const gameInnings = state.history.filter(h => h.game === gameNum).sort((a,b) => a.inning - b.inning);
  const info = state.gameInfo?.[gameNum] || {};
  const dateStr = info.date ? new Date(info.date + 'T12:00:00').toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'}) : '';
  const oppStr = info.opponent || '';

  const pageW = 612, pageH = 792;
  const margin = 36;

  gameInnings.forEach((entry, pageIdx) => {
    if (pageIdx > 0) doc.addPage();

    // Header bar
    doc.setFillColor(232, 24, 40);
    doc.rect(0, 0, pageW, 52, 'F');
    doc.setFillColor(0, 45, 114);
    doc.rect(0, 52, pageW, 8, 'F');

    doc.setTextColor(255, 255, 255);
    doc.setFontSize(20);
    doc.setFont('helvetica', 'bold');
    doc.text('PHILLIES LINEUP TRACKER', margin, 28);
    doc.setFontSize(10);
    doc.setFont('helvetica', 'normal');
    const sub = [oppStr ? `vs. ${oppStr}` : '', dateStr, `Game ${gameNum}`].filter(Boolean).join('  ·  ');
    doc.text(sub, margin, 44);

    // Inning label
    doc.setTextColor(30, 30, 30);
    doc.setFontSize(16);
    doc.setFont('helvetica', 'bold');
    doc.text(`INNING ${entry.inning}`, margin, 82);

    // --- LEFT: Field positions list ---
    const leftX = margin;
    const rightX = pageW / 2 + 10;
    let y = 100;

    doc.setFontSize(8);
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(150, 150, 150);
    doc.text('FIELD POSITIONS', leftX, y); y += 14;

    doc.setFontSize(11);
    POSITIONS.forEach(pos => {
      const player = entry.lineup[pos] || '—';
      // row bg
      doc.setFillColor(245, 245, 245);
      doc.rect(leftX, y - 11, pageW/2 - margin - 10, 16, 'F');
      doc.setTextColor(232, 24, 40);
      doc.setFont('helvetica', 'bold');
      doc.text(pos, leftX + 4, y);
      doc.setTextColor(30, 30, 30);
      doc.setFont('helvetica', 'normal');
      doc.text(POS_NAMES[pos], leftX + 32, y);
      doc.setFont('helvetica', 'bold');
      doc.text(player, leftX + 130, y);
      y += 18;
    });

    // Bench
    if (entry.bench && entry.bench.length) {
      y += 6;
      doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(150,150,150);
      doc.text('BENCH', leftX, y); y += 12;
      doc.setFontSize(11); doc.setFont('helvetica','normal'); doc.setTextColor(100,100,100);
      doc.text(entry.bench.join(', '), leftX, y); y += 16;
    }

    // Absent
    if (entry.absent && entry.absent.length) {
      y += 4;
      doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(200,50,50);
      doc.text('ABSENT', leftX, y); y += 12;
      doc.setFontSize(11); doc.setFont('helvetica','normal'); doc.setTextColor(180,80,80);
      doc.text(entry.absent.join(', '), leftX, y);
    }

    // --- RIGHT: Batting order ---
    const positionOf = {};
    Object.entries(entry.lineup).forEach(([pos, player]) => { positionOf[player] = pos; });

    let ry = 100;
    doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(150,150,150);
    doc.text('BATTING ORDER', rightX, ry); ry += 14;

    doc.setFontSize(11);
    state.battingOrder.forEach((player, idx) => {
      const pos = positionOf[player] || (entry.bench?.includes(player) ? 'BENCH' : (entry.absent?.includes(player) ? 'ABS' : '—'));
      doc.setFillColor(idx % 2 === 0 ? 248 : 240, idx % 2 === 0 ? 248 : 240, idx % 2 === 0 ? 248 : 240);
      doc.rect(rightX, ry - 11, pageW/2 - margin - 10, 16, 'F');
      doc.setTextColor(232, 24, 40); doc.setFont('helvetica','bold');
      doc.text(`${idx+1}`, rightX + 4, ry);
      doc.setTextColor(30,30,30); doc.setFont('helvetica','normal');
      doc.text(player, rightX + 24, ry);
      doc.setTextColor(120,120,120); doc.setFont('helvetica','bold');
      doc.text(pos, rightX + 120, ry);
      ry += 18;
    });

    // Divider line
    doc.setDrawColor(232, 24, 40);
    doc.setLineWidth(0.5);
    doc.line(pageW/2, 62, pageW/2, pageH - margin);

    // --- DIAMOND GRAPHIC (bottom half of page) ---
    const dTop = Math.max(y, ry) + 24;
    const dAvail = pageH - 30 - dTop;
    const dSize = Math.min(dAvail * 0.9, pageW - margin * 2);
    const dcx = pageW / 2;
    const dcy = dTop + dSize * 0.5;
    const r = dSize * 0.36;

    // Section label
    doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(150,150,150);
    doc.text('FIELD DIAGRAM', margin, dTop - 6);

    // Outfield grass background (arc approximated as a large ellipse clip)
    doc.setFillColor(210, 235, 210);
    doc.setDrawColor(160, 200, 160);
    doc.setLineWidth(0.8);
    // Draw arc as a series of line segments from left field corner to right field corner going up
    const arcPts = [];
    for (let a = 0; a <= 180; a += 5) {
      const rad = (a + 180) * Math.PI / 180;
      arcPts.push([
        dcx + Math.cos(rad) * r * 1.55,
        dcy + Math.sin(rad) * r * 1.55
      ]);
    }
    // Fill outfield as polygon
    const lfCorner = [dcx - r * 0.95, dcy + r * 0.2];
    const rfCorner = [dcx + r * 0.95, dcy + r * 0.2];
    doc.setFillColor(210, 235, 210);
    doc.lines(
      arcPts.slice(1).map((p,i) => [p[0]-arcPts[i][0], p[1]-arcPts[i][1]]),
      arcPts[0][0], arcPts[0][1], [1,1], 'S'
    );

    // Infield grass
    const homeP  = [dcx,              dcy + r * 0.78];
    const firstP = [dcx + r * 0.75,   dcy + r * 0.1];
    const secP   = [dcx,              dcy - r * 0.58];
    const thirdP = [dcx - r * 0.75,   dcy + r * 0.1];

    doc.setFillColor(200, 230, 200);
    doc.setDrawColor(140, 190, 140);
    doc.setLineWidth(0.5);
    // Draw diamond as 4 triangles from center
    const mid = [dcx, dcy + r*0.1];
    [[homeP,firstP],[firstP,secP],[secP,thirdP],[thirdP,homeP]].forEach(([a,b]) => {
      doc.triangle(mid[0],mid[1], a[0],a[1], b[0],b[1], 'FD');
    });

    // Dirt warning track feel - basepath lines
    doc.setDrawColor(139, 115, 85);
    doc.setLineWidth(2);
    doc.line(homeP[0], homeP[1], firstP[0], firstP[1]);
    doc.line(firstP[0], firstP[1], secP[0], secP[1]);
    doc.line(secP[0], secP[1], thirdP[0], thirdP[1]);
    doc.line(thirdP[0], thirdP[1], homeP[0], homeP[1]);

    // Bases
    const bs = r * 0.055;
    [[firstP],[secP],[thirdP]].forEach(([b]) => {
      doc.setFillColor(255,255,255);
      doc.setDrawColor(80,80,80);
      doc.setLineWidth(0.5);
      doc.rect(b[0]-bs, b[1]-bs, bs*2, bs*2, 'FD');
    });

    // Home plate (pentagon shape)
    doc.setFillColor(255,255,255);
    doc.setDrawColor(80,80,80);
    doc.setLineWidth(0.5);
    doc.rect(homeP[0]-bs, homeP[1]-bs*0.7, bs*2, bs*1.4, 'FD');

    // Pitcher mound
    doc.setFillColor(190,165,120);
    doc.setDrawColor(160,135,90);
    doc.setLineWidth(0.5);
    const moundY = dcy + r * 0.12;
    doc.circle(dcx, moundY, r*0.045, 'FD');

    // Player labels — positioned at each field position
    const posCoords = {
      P:    [dcx,              moundY],
      C:    [dcx,              dcy + r * 0.95],
      '1B': [dcx + r * 0.88,  dcy + r * 0.1],
      '2B': [dcx + r * 0.42,  dcy - r * 0.3],
      '3B': [dcx - r * 0.88,  dcy + r * 0.1],
      SS:   [dcx - r * 0.42,  dcy - r * 0.3],
      LF:   [dcx - r * 1.0,   dcy - r * 0.72],
      CF:   [dcx,              dcy - r * 1.05],
      RF:   [dcx + r * 1.0,   dcy - r * 0.72],
    };

    const bw = 62, bh = 20;
    POSITIONS.forEach(pos => {
      const [px, py] = posCoords[pos];
      const player = entry.lineup[pos] || '';
      const hasPlayer = player.length > 0;

      // Background pill
      if (hasPlayer) {
        doc.setFillColor(232, 24, 40);
      } else {
        doc.setFillColor(180, 180, 180);
      }
      doc.roundedRect(px - bw/2, py - bh/2, bw, bh, 3, 3, 'F');

      // Position tag (small, top)
      doc.setFontSize(6.5); doc.setFont('helvetica','bold');
      doc.setTextColor(255, 220, 220);
      doc.text(pos, px, py - 2, {align:'center'});

      // Player name (larger, bottom)
      doc.setFontSize(8); doc.setFont('helvetica','bold');
      doc.setTextColor(255, 255, 255);
      const name = player || '—';
      doc.text(name.length > 8 ? name.substring(0,8) : name, px, py + 7, {align:'center'});
    });

    // Footer
    doc.setFontSize(8); doc.setTextColor(180,180,180); doc.setFont('helvetica','normal');
    doc.text('Phillies Lineup Tracker  ·  Game '+gameNum+'  ·  Inning '+entry.inning, margin, pageH - 12);
    doc.text(new Date().toLocaleDateString(), pageW - margin - 60, pageH - 12);
  });

  // Open PDF
  const pdfBlob = doc.output('bloburl');
  window.open(pdfBlob, '_blank');
  showToast("PDF ready ✓");
}

// ── PITCH RULES HELPERS ───────────────────────────────────────────────────────
function getPitchLimit() {
  return state.ageGroup === '9-10' ? 75 : 50;
}

function getPitches(player) {
  return state.pitchCounts[state.game + '_' + player] || 0;
}

function getCatcherInnings(player) {
  // Count innings caught this game from history
  return state.history.filter(h => h.game === state.game && h.lineup?.['C'] === player).length;
}

function isRemovedPitcher(player) {
  return !!(state.removedPitchers[state.game + '_' + player]);
}

function daysOfRest(count) {
  if (count >= 66) return 4;
  if (count >= 51) return 3;
  if (count >= 36) return 2;
  if (count >= 21) return 1;
  return 0;
}

function pitcherEligibility(player) {
  // Returns { eligible: bool, reason: string }
  if (isRemovedPitcher(player)) return { eligible: false, reason: 'Already removed from mound this game' };
  const caught = getCatcherInnings(player);
  if (caught >= 4) return { eligible: false, reason: 'Caught 4+ innings — ineligible to pitch today' };
  const count = getPitches(player);
  const limit = getPitchLimit();
  if (count >= limit) return { eligible: false, reason: 'Pitch limit reached ('+count+'/'+limit+')' };
  return { eligible: true, reason: '' };
}

function catcherEligibility(player) {
  const count = getPitches(player);
  if (count >= 41) return { eligible: false, reason: 'Threw 41+ pitches — ineligible for catcher remainder of game' };
  return { eligible: true, reason: '' };
}

function markPitcherRemoved(player) {
  state.removedPitchers[state.game + '_' + player] = true;
  saveState(); renderPitchesTab(); renderQuickTab();
}

function addPitch(player, delta) {
  const key = state.game + '_' + player;
  const current = state.pitchCounts[key] || 0;
  if (delta === 0 && current === 0) {
    state.pitchCounts[key] = 0;
  } else {
    state.pitchCounts[key] = Math.max(0, current + delta);
  }
  saveState(); renderPitchesTab(); renderQuickTab();
}

function setAgeGroup(val) {
  state.ageGroup = val;
  saveState(); renderPitchesTab();
}

function resetPitchCounts() {
  showModal("Reset Pitch Counts", "Reset all pitch counts and removed pitcher flags for this game?", "Reset", () => {
    state.players.forEach(p => {
      delete state.pitchCounts[state.game + '_' + p];
      delete state.removedPitchers[state.game + '_' + p];
    });
    saveState(); showToast("Pitch counts reset"); renderPitchesTab(); renderQuickTab();
  }, "btn-red");
}

// ── RENDER PITCH COUNT ────────────────────────────────────────────────────────
function renderPitchesTab() {
  const limit = getPitchLimit();
  const currentPitcher = state.lineup['P'] || '';
  const pitchedThisGame = state.players.filter(p => getPitches(p) > 0 || p === currentPitcher);

  let html = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:10px">'
    +'<div class="label" style="margin:0;border:none">Pitch Counts — Game '+state.game+'</div>'
    +'<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">'
    +'<select onchange="setAgeGroup(this.value)" style="background:#1c1c1e;border:1px solid #444;border-radius:3px;color:#F5F0E8;font-size:12px;padding:5px 8px;cursor:pointer">'
    +'<option value="7-8" '+(state.ageGroup==='7-8'?'selected':'')+'>Age 7-8 (50 pitches)</option>'
    +'<option value="9-10" '+(state.ageGroup==='9-10'?'selected':'')+'>Age 9-10 (75 pitches)</option>'
    +'</select>'
    +'<button class="btn btn-red" style="padding:6px 10px;font-size:10px" onclick="resetPitchCounts()">↺ Reset</button>'
    +'</div></div>'
    +'<div style="font-size:10px;color:#555;margin-bottom:14px;letter-spacing:1px">Limit: '+limit+' pitches · Catcher rule: 4+ innings = ineligible to pitch</div>';

  if (pitchedThisGame.length === 0) {
    html += '<div class="empty">No pitchers tracked yet.<br>Assign a pitcher in the Lineup tab, then add pitches here or in Inning View.</div>';
  } else {
    pitchedThisGame.forEach(player => {
      const count = getPitches(player);
      const pct = Math.min(count / limit, 1);
      const barColor = pct >= 1 ? '#E81828' : pct >= 0.8 ? '#f59e0b' : '#22c55e';
      const isCurrent = player === currentPitcher;
      const eligibility = pitcherEligibility(player);
      const catchElig = catcherEligibility(player);
      const rest = daysOfRest(count);
      const removed = isRemovedPitcher(player);
      const caught = getCatcherInnings(player);

      html += '<div class="pitch-player-card" style="border-color:'+(isCurrent?'#E81828':removed||!eligibility.eligible?'#5a0910':'#2a2a2e')+'">'
        +'<div style="flex:1">'
        +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap">'
        +'<span class="pitch-name">'+player+'</span>'
        +(isCurrent?'<span style="font-size:9px;background:#5a0910;color:#E81828;padding:2px 7px;border-radius:2px;font-weight:700;letter-spacing:1px">PITCHING</span>':'')
        +(removed?'<span style="font-size:9px;background:#2a0a0a;color:#E81828;padding:2px 7px;border-radius:2px;font-weight:700;letter-spacing:1px">REMOVED</span>':'')
        +(count >= limit?'<span style="font-size:9px;background:#5a0910;color:#E81828;padding:2px 7px;border-radius:2px;font-weight:700;letter-spacing:1px">AT LIMIT</span>':'')
        +(count >= limit*0.8 && count < limit?'<span style="font-size:9px;background:#3a2d0a;color:#f59e0b;padding:2px 7px;border-radius:2px;font-weight:700;letter-spacing:1px">NEAR LIMIT</span>':'')
        +(caught >= 4?'<span style="font-size:9px;background:#2a0a0a;color:#E81828;padding:2px 7px;border-radius:2px;font-weight:700;letter-spacing:1px">CAUGHT 4+ INN</span>':'')
        +(!catchElig.eligible?'<span style="font-size:9px;background:#2a0a0a;color:#f59e0b;padding:2px 7px;border-radius:2px;font-weight:700;letter-spacing:1px">NO CATCHER</span>':'')
        +'</div>'
        +'<div class="pitch-bar-wrap"><div class="pitch-bar" style="width:'+Math.round(pct*100)+'%;background:'+barColor+'"></div></div>'
        +(rest > 0?'<div style="font-size:10px;color:#f59e0b;margin-top:5px;letter-spacing:1px">'+rest+' day'+(rest>1?'s':'')+' rest required</div>':'')
        +(!eligibility.eligible && !isCurrent?'<div style="font-size:10px;color:#E81828;margin-top:4px;letter-spacing:1px">⚠ '+eligibility.reason+'</div>':'')
        +'</div>'
        +'<div style="display:flex;flex-direction:column;gap:6px;align-items:center">'
        +'<div class="pitch-controls">'
        +'<button class="pitch-btn pitch-btn-minus" onclick="addPitch(\''+player+'\',-1)">−</button>'
        +'<span class="pitch-count-display" style="color:'+barColor+'">'+count+'</span>'
        +'<button class="pitch-btn pitch-btn-plus" onclick="addPitch(\''+player+'\',1)">+</button>'
        +'</div>'
        +(isCurrent&&!removed?'<button onclick="markPitcherRemoved(\''+player+'\')" style="font-size:9px;background:#2a0a0a;border:1px solid #5a0910;color:#E81828;border-radius:3px;padding:3px 8px;cursor:pointer;letter-spacing:1px;white-space:nowrap">REMOVE FROM MOUND</button>':'')
        +'</div></div>';
    });
  }

  // Add pitcher section
  const notTracked = state.players.filter(p => !pitchedThisGame.includes(p) && !state.absent.includes(p));
  if (notTracked.length) {
    html += '<div class="label" style="margin-top:16px">Add Pitcher</div><div style="display:flex;flex-wrap:wrap;gap:6px">';
    notTracked.forEach(p => {
      const elig = pitcherEligibility(p);
      html += '<button onclick="addPitch(\''+p+'\',0)" style="padding:6px 12px;background:#1c1c1e;border:1px solid '+(elig.eligible?'#333':'#5a0910')+';border-radius:3px;color:'+(elig.eligible?'#888':'#E81828')+';font-size:12px;cursor:pointer;'+(elig.eligible?'':'opacity:0.6;')+'">'+p+(elig.eligible?'':' ⚠')+'</button>';
    });
    html += '</div>';
  }

  document.getElementById("tab-pitches").innerHTML = html;
}
function renderQuickTab() {
  // Get lineup for activeInning — history entry or current draft
  let activeLineup = {};
  if (state.activeInning === state.inning) {
    activeLineup = state.lineup;
  } else {
    const entry = state.history.find(h => h.game === state.game && h.inning === state.activeInning);
    if (entry) activeLineup = entry.lineup;
  }

  const hasLineup = Object.keys(activeLineup).length > 0;
  const positionOf = {};
  Object.entries(activeLineup).forEach(([pos, player]) => { positionOf[player] = pos; });
  const pitcher = activeLineup['P'];

  let html = '<div class="quick-inning-badge">'
    +'<span style="font-size:10px;color:#666;letter-spacing:2px;font-family:\'Arial Narrow\',Arial,sans-serif">GAME</span>'
    +'<span style="font-size:18px;font-weight:900;color:#E81828;font-family:\'Arial Narrow\',Arial,sans-serif">'+state.game+'</span>'
    +'<span style="color:#333">|</span>'
    +'<span style="font-size:10px;color:#666;letter-spacing:2px;font-family:\'Arial Narrow\',Arial,sans-serif">INNING</span>'
    +'<span style="font-size:18px;font-weight:900;color:#F5F0E8;font-family:\'Arial Narrow\',Arial,sans-serif">'+state.activeInning+'</span>'
    +(state.activeInning !== state.inning?'<span style="font-size:9px;color:#f59e0b;letter-spacing:1px;padding:2px 6px;background:#3a2d0a;border-radius:2px;border:1px solid #f59e0b">PAST</span>':'')
    +'</div>';

  // Pitcher pitch count highlight
  if (pitcher) {
    const pitches = getPitches(pitcher);
    const limit = getPitchLimit();
    const pct = Math.min(pitches / limit, 1);
    const barColor = pct >= 1 ? '#E81828' : pct >= 0.8 ? '#f59e0b' : '#22c55e';
    const rest = daysOfRest(pitches);
    html += '<div style="background:#1c1c1e;border:1px solid #333;border-left:3px solid '+barColor+';border-radius:4px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:12px">'
      +'<div><div style="font-size:10px;color:#666;letter-spacing:2px">PITCHER</div>'
      +'<div style="font-size:16px;font-weight:700;color:#F5F0E8">'+pitcher+'</div>'
      +(rest>0?'<div style="font-size:10px;color:#f59e0b;margin-top:2px">'+rest+' day'+(rest>1?'s':'')+' rest after game</div>':'')
      +'</div>'
      +'<div style="flex:1">'
      +'<div style="display:flex;justify-content:space-between;margin-bottom:4px">'
      +'<span style="font-size:11px;color:#888">Pitches</span>'
      +'<span style="font-size:13px;font-weight:900;color:'+barColor+'">'+pitches+' / '+limit+'</span></div>'
      +'<div class="pitch-bar-wrap"><div class="pitch-bar" style="width:'+Math.round(pct*100)+'%;background:'+barColor+'"></div></div>'
      +'</div>'
      +'<div style="display:flex;gap:6px">'
      +'<button class="pitch-btn pitch-btn-minus" onclick="addPitch(\''+pitcher+'\',-1)">−</button>'
      +'<button class="pitch-btn pitch-btn-plus" onclick="addPitch(\''+pitcher+'\',1)">+</button>'
      +'</div></div>';
  }

  if (!hasLineup) {
    html += '<div class="empty">No lineup for inning '+state.activeInning+'.<br>Go to Lineup tab to set positions.</div>';
  } else {
    html += '<div class="label">Field — Inning '+state.activeInning+'</div><div class="quick-grid">';
    POSITIONS.forEach(pos => {
      const player = activeLineup[pos] || '';
      html += '<div class="quick-pos-card">'
        +'<div class="quick-pos">'+pos+' · '+POS_NAMES[pos]+'</div>'
        +'<div class="quick-name">'+(player || '—')+'</div>'
        +'</div>';
    });
    html += '</div>';
  }

  // Bench for this inning
  if (state.activeInning !== state.inning) {
    const entry = state.history.find(h => h.game === state.game && h.inning === state.activeInning);
    const bench = entry?.bench || [];
    if (bench.length) {
      html += '<div class="label">Bench</div><div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">';
      bench.forEach(p => { html += '<span style="padding:5px 12px;background:#1c1c1e;border:1px solid #2a2a2e;border-radius:3px;font-size:13px;color:#888">'+p+'</span>'; });
      html += '</div>';
    }
  } else {
    const bench = state.players.filter(p => !Object.values(activeLineup).includes(p) && !state.absent.includes(p));
    if (bench.length) {
      html += '<div class="label">Bench</div><div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">';
      bench.forEach(p => { html += '<span style="padding:5px 12px;background:#1c1c1e;border:1px solid #2a2a2e;border-radius:3px;font-size:13px;color:#888">'+p+'</span>'; });
      html += '</div>';
    }
  }

  // Batting order
  html += '<div class="label">Batting Order</div><div class="quick-bat">';
  state.battingOrder.forEach((player, idx) => {
    const pos = positionOf[player] || (state.absent.includes(player) ? 'ABS' : 'BENCH');
    const isAbs = state.absent.includes(player);
    html += '<div class="quick-bat-item" style="opacity:'+(isAbs?'0.4':'1')+'">'
      +'<span class="quick-bat-num">'+(idx+1)+'</span>'
      +'<span class="quick-bat-name">'+player+'</span>'
      +'<span class="quick-bat-pos">'+pos+'</span>'
      +'</div>';
  });
  html += '</div>';

  document.getElementById("tab-quick").innerHTML = html;
}

  renderLineupTab(); renderQuickTab(); renderPitchesTab(); renderBattingTab(); renderPrefsTab(); renderStatsTab(); renderHistoryTab(); renderDiamondTab(); updateHeaderSub();
}
